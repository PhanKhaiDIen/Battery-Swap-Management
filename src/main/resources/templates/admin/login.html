<html lang="vi">

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản trị hệ thống | VinFast EV</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --vinfast-blue: #122147;
            --accent-color: #3c52e8;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Ảnh nền công nghệ lấy từ Internet */
            background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hiệu ứng kính mờ cho hộp đăng nhập */
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .admin-logo {
            width: 140px;
            margin-bottom: 25px;
        }

        .login-card h3 {
            font-weight: 700;
            color: var(--vinfast-blue);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-card p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Tùy chỉnh Input */
        .input-group {
            background: #f1f3f6;
            border-radius: 12px;
            padding: 5px 15px;
            margin-bottom: 20px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--accent-color);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(60, 82, 232, 0.1);
        }

        .input-group i {
            color: #aaa;
            line-height: 45px;
        }

        .form-control {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            height: 45px;
            font-weight: 500;
        }

        /* Nút đăng nhập sang trọng */
        .btn-admin {
            background: var(--vinfast-blue);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-admin:hover {
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(18, 33, 71, 0.3);
            color: white;
        }

        .back-home {
            display: block;
            margin-top: 25px;
            text-decoration: none;
            color: #888;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .back-home:hover { color: var(--accent-color); }
    </style>
</head>

    <h3>Admin Panel</h3>
    <p>Hệ thống quản lý Trạm đổi Pin EV</p>

    <form id="loginFormAdmin">
        <div class="input-group">
            <i class="fas fa-user-tie"></i>
            <input type="text" name="username" class="form-control" placeholder="Tài khoản Quản trị" required>
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" class="form-control" placeholder="Mật khẩu bảo mật" required>
        </div>

        <button type="submit" class="btn btn-admin">
            <i class="fas fa-shield-alt me-2"></i> ĐĂNG NHẬP HỆ THỐNG
        </button>
    </form>

    <a href="/" class="back-home">← Quay lại trang chủ</a>
</div>

<script>
    document.getElementById("loginFormAdmin").addEventListener("submit", async function(event){
        event.preventDefault();

        // Hiệu ứng Loading đẹp của SweetAlert2
        Swal.fire({
            title: 'Đang xác thực quyền Admin...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading() }
        });

        const formData = new FormData(this);
        try {
            const response = await fetch("/admin/login", {
                method: "POST",
                body: formData
            });

            if (response.ok) {
                Swal.fire({
                    icon: 'success',
                    title: 'Xác thực thành công',
                    text: 'Chào mừng Sếp quay trở lại!',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    window.location.href = '/admin/dashboard';
                });
            } else {
                const errorMsg = await response.text();
                Swal.fire({
                    icon: 'error',
                    title: 'Truy cập bị từ chối',
                    text: errorMsg || 'Sai tài khoản hoặc mật khẩu Admin!'
                });
            }
        } catch (error) {
            Swal.fire({ icon: 'error', title: 'Lỗi kết nối', text: 'Không thể kết nối đến Server!' });
        }
    });
</script>

</body>
</html>
