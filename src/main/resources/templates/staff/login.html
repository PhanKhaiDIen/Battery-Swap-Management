<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Login - VinFast EV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --vin-blue: #122147;
            --vin-accent: #0056b3;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            width: 900px;
            max-width: 95%;
            min-height: 550px;
            overflow: hidden;
        }

        /* PHẦN ẢNH BÊN TRÁI - LẤY TỪ MẠNG */
        .side-banner {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1593941707882-a5bba14938c7?q=80&w=2072&auto=format&fit=crop') center/cover no-repeat;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 40px;
        }

        /* Tạo lớp phủ tối để chữ hiện rõ trên ảnh */
        .side-banner::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.7) 100%);
        }

        .banner-text {
            position: relative;
            z-index: 2;
            color: white;
        }

        /* PHẦN FORM BÊN PHẢI */
        .form-section {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo-box img {
            width: 130px;
            margin-bottom: 25px;
        }

        .login-title {
            font-weight: 700;
            color: var(--vin-blue);
            margin-bottom: 5px;
        }

        .login-sub {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-control {
            border: none;
            border-bottom: 1.5px solid #ddd;
            border-radius: 0;
            padding: 10px 0;
            margin-bottom: 20px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: var(--vin-blue);
        }

        .btn-login {
            background: var(--vin-blue);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 15px;
        }

        .btn-login:hover {
            background: #000;
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .side-banner { display: none; }
        }
    </style>
</head>

<div class="login-card">
    <div class="side-banner">
        <div class="banner-text">
            <h3>Hệ thống Trạm đổi Pin</h3>
            <p>Giải pháp quản lý năng lượng thông minh VinFast</p>
        </div>

        <h4 class="login-title">Xác minh Staff</h4>
        <p class="login-sub">Vui lòng đăng nhập tài khoản nhân viên</p>

        <form id="loginFormStaff">
            <div class="mb-3">
                <input type="text" class="form-control" name="username" placeholder="Tài khoản nhân viên" required>
            </div>
            <div class="mb-4 position-relative">
                <input type="password" class="form-control" name="password" id="password" placeholder="Mật khẩu" required>
                <i class="fa-solid fa-eye" id="togglePassword" style="position:absolute; right:0; top:12px; cursor:pointer; color:#ccc;"></i>
            </div>
            <button type="submit" class="btn btn-login w-100">ĐĂNG NHẬP HỆ THỐNG</button>
        </form>

        <div class="text-center mt-4">
            <a href="/" style="text-decoration:none; color:#aaa; font-size:0.85rem;">← Quay lại trang chủ</a>
        </div>
    </div>
</div>

<script>
    // Ẩn/Hiện mật khẩu
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    // Gửi Form bằng Fetch
    document.getElementById("loginFormStaff").addEventListener("submit", async function(e) {
        e.preventDefault();
        const formData = new FormData(this);

        Swal.fire({ title: 'Đang xác thực...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            const response = await fetch("/staff/login", { method: "POST", body: formData });
            if (response.ok) {
                Swal.fire({ icon: 'success', title: 'Thành công!', showConfirmButton: false, timer: 1500 })
                    .then(() => window.location.href = '/staff/dashboard');
            } else {
                const msg = await response.text();
                Swal.fire({ icon: 'error', title: 'Lỗi', text: msg || 'Sai thông tin đăng nhập!' });
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'Lỗi kết nối', text: 'Không thể kết nối đến server!' });
        }
    });
</script>
